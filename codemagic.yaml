workflows:
  ios-workflow:
    name: iOS Release IPA
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.yourapp.bundleid

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-method ad-hoc

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log