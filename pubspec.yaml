name: kal_rasol_allah
description: "تطبيق قال رسول الله للمواظبة علي السنن النبوية"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  arabic_font: ^0.0.9
  cupertino_icons: ^1.0.8
  dots_indicator: ^4.0.1
  flutter:
    sdk: flutter
  flutter_calendar_carousel: ^2.5.4
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1
  permission_handler: ^11.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  lottie: ^3.3.3
  share_plus: ^13.1.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# ✅ إعدادات الأيقونة
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/consts/logo.jpg"

  # 🔥 (اختياري بس مهم عشان شكل احترافي على Android)
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/consts/logo.jpg"

flutter:
  uses-material-design: true

  assets:
    - assets/consts/
    - assets/icons/
    - assets/content/
    - assets/backgrounds/
    - assets/lottie/
